name: 🔍 Workflow Monitor

on:
  schedule:
    - cron: '*/10 * * * *'   # Har 10 minute mein
  workflow_dispatch:           # Manual trigger bhi

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Fetch latest workflow run logs from Claude repo
        env:
          PAT: ${{ secrets.MONITOR_PAT }}
          TARGET_REPO: "error404unknownuser99-ux/Claude"
        run: |
          mkdir -p output/logs

          echo "========================================" | tee -a output/logs/all_logs.txt
          echo "🕐 Monitor Run: $(date '+%Y-%m-%d %H:%M:%S UTC')" | tee -a output/logs/all_logs.txt
          echo "========================================" | tee -a output/logs/all_logs.txt

          # Step 1: Latest run ID fetch karo
          echo "📡 Fetching latest workflow run..." | tee -a output/logs/all_logs.txt

          RUNS=$(curl -s \
            -H "Authorization: token $PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$TARGET_REPO/actions/runs?per_page=1")

          RUN_ID=$(echo $RUNS | python3 -c "import sys,json; runs=json.load(sys.stdin)['workflow_runs']; print(runs[0]['id']) if runs else print('')")
          RUN_STATUS=$(echo $RUNS | python3 -c "import sys,json; runs=json.load(sys.stdin)['workflow_runs']; print(runs[0]['status']) if runs else print('')")
          RUN_CONCLUSION=$(echo $RUNS | python3 -c "import sys,json; runs=json.load(sys.stdin)['workflow_runs']; print(runs[0]['conclusion']) if runs else print('pending')")
          RUN_NAME=$(echo $RUNS | python3 -c "import sys,json; runs=json.load(sys.stdin)['workflow_runs']; print(runs[0]['name']) if runs else print('')")
          RUN_TIME=$(echo $RUNS | python3 -c "import sys,json; runs=json.load(sys.stdin)['workflow_runs']; print(runs[0]['created_at']) if runs else print('')")

          echo "🆔 Run ID    : $RUN_ID"      | tee -a output/logs/all_logs.txt
          echo "📋 Workflow  : $RUN_NAME"    | tee -a output/logs/all_logs.txt
          echo "⚡ Status    : $RUN_STATUS"  | tee -a output/logs/all_logs.txt
          echo "✅ Conclusion: $RUN_CONCLUSION" | tee -a output/logs/all_logs.txt
          echo "🕐 Created   : $RUN_TIME"    | tee -a output/logs/all_logs.txt

          if [ -z "$RUN_ID" ]; then
            echo "❌ No runs found!" | tee -a output/logs/all_logs.txt
            echo "❌ No runs found! [$(date)]" >> output/logs/errors.txt
            exit 0
          fi

          # Step 2: Jobs fetch karo
          JOBS=$(curl -s \
            -H "Authorization: token $PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$TARGET_REPO/actions/runs/$RUN_ID/jobs")

          JOB_ID=$(echo $JOBS | python3 -c "import sys,json; jobs=json.load(sys.stdin)['jobs']; print(jobs[0]['id']) if jobs else print('')")

          echo "🔧 Job ID    : $JOB_ID" | tee -a output/logs/all_logs.txt

          # Step 3: Job logs fetch karo
          if [ -n "$JOB_ID" ]; then
            echo "" | tee -a output/logs/all_logs.txt
            echo "📜 --- JOB LOGS ---" | tee -a output/logs/all_logs.txt

            curl -s \
              -H "Authorization: token $PAT" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$TARGET_REPO/actions/jobs/$JOB_ID/logs" \
              -o /tmp/job_logs.txt

            cat /tmp/job_logs.txt | tee -a output/logs/all_logs.txt

            # Last 20 lines
            tail -20 /tmp/job_logs.txt > output/logs/last20lines.txt
            echo "🕐 Updated: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> output/logs/last20lines.txt
          fi

          # Step 4: Errors capture karo
          echo "" >> output/logs/all_logs.txt
          echo "--- Error Check ---" >> output/logs/all_logs.txt
          if [ "$RUN_CONCLUSION" = "failure" ]; then
            echo "❌ FAILED RUN DETECTED!" | tee -a output/logs/errors.txt
            echo "Run ID: $RUN_ID" | tee -a output/logs/errors.txt
            echo "Time: $RUN_TIME" | tee -a output/logs/errors.txt
            echo "Workflow: $RUN_NAME" | tee -a output/logs/errors.txt
            echo "---" >> output/logs/errors.txt
            echo "❌ FAILED run detected → errors.txt mein save kiya" | tee -a output/logs/all_logs.txt
          else
            echo "✅ No errors in latest run" | tee -a output/logs/all_logs.txt
          fi

          echo "" | tee -a output/logs/all_logs.txt
          echo "========================================" | tee -a output/logs/all_logs.txt
          echo "" | tee -a output/logs/all_logs.txt

      - name: Commit logs to repo
        run: |
          git config user.name "badman99dev"
          git config user.email "badman99dev@users.noreply.github.com"
          git add output/logs/
          git diff --staged --quiet || git commit -m "🤖 Monitor update [$(date '+%Y-%m-%d %H:%M:%S')]"
          git push
